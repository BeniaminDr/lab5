<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorium 5</title>
  </head>

  <body class="min-h-screen flex items-center justify-center bg-white">
    <main class="w-full max-w-md p-6">
      <h1 class="text-2xl font-bold text-primary mb-6">
        Kalkulator dni od urodzenia
      </h1>

      <form id="birthdayForm" class="flex flex-col gap-4">
        <label for="birthday" class="font-medium">
          Wybierz datę urodzenia:
        </label>

        <input
          id="birthday"
          type="date"
          required
          class="border border-gray-400 rounded p-3"
        />

        <button
          type="submit"
          class="bg-blue-300 p-4 rounded font-semibold"
        >
          Sprawdź
        </button>
      </form>

      <dialog
        id="resultDialog"
        class="bg-gray-200 text-red-600 rounded-lg p-6 relative max-w-md w-11/12"
      >
        <button
          id="closeDialog"
          type="button"
          class="absolute top-2 right-3 font-bold"
        >
          x
        </button>

        <p id="resultText" class="whitespace-pre-line pr-6"></p>
      </dialog>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
